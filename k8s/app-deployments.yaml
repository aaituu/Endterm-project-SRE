apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: school-platform
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-migrate
          image: school-db-migrate:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: school-config
            - secretRef:
                name: school-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: school-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: school-auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: school-config
            - secretRef:
                name: school-secrets
          env:
            - name: SERVICE_NAME
              value: auth-service
            - name: PORT
              value: "3001"
            - name: BACKEND_SRC_PATH
              value: /app/backend/src
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: school-platform
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
---
