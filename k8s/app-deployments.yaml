apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: school-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: school-api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: api-gateway
            - name: PORT
              value: "8080"
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
            - name: USER_SERVICE_URL
              value: http://user-service:3002
            - name: SCHOOL_SERVICE_URL
              value: http://school-service:3003
            - name: ACADEMIC_SERVICE_URL
              value: http://academic-service:3004
            - name: ASSIGNMENT_SERVICE_URL
              value: http://assignment-service:3005
            - name: CONTENT_SERVICE_URL
              value: http://content-service:3006
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service:3007
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:3008
            - name: UPSTREAM_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: school-config
                  key: UPSTREAM_TIMEOUT_MS
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: school-platform
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
