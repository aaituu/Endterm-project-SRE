apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: school-platform
  namespace: school-platform
spec:
  rules:
    - host: school.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
