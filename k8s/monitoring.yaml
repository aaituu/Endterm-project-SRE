apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: school-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alert-rules.yml

    scrape_configs:
      - job_name: api-gateway
        metrics_path: /metrics
        static_configs:
          - targets: ["api-gateway:8080"]
      - job_name: auth-service
        metrics_path: /metrics
        static_configs:
          - targets: ["auth-service:3001"]
      - job_name: user-service
        metrics_path: /metrics
        static_configs:
          - targets: ["user-service:3002"]
      - job_name: school-service
        metrics_path: /metrics
        static_configs:
          - targets: ["school-service:3003"]
      - job_name: academic-service
        metrics_path: /metrics
        static_configs:
          - targets: ["academic-service:3004"]
      - job_name: assignment-service
        metrics_path: /metrics
        static_configs:
          - targets: ["assignment-service:3005"]
      - job_name: content-service
        metrics_path: /metrics
        static_configs:
          - targets: ["content-service:3006"]
      - job_name: analytics-service
        metrics_path: /metrics
        static_configs:
          - targets: ["analytics-service:3007"]
      - job_name: notification-service
        metrics_path: /metrics
        static_configs:
          - targets: ["notification-service:3008"]
  alert-rules.yml: |
    groups:
      - name: school-platform-alerts
        rules:
          - alert: SchoolServiceDown
            expr: up{job=~"api-gateway|auth-service|user-service|school-service|academic-service|assignment-service|content-service|analytics-service|notification-service"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "Prometheus cannot scrape {{ $labels.job }} for more than 1 minute."
          - alert: SchoolServiceHighLatencyP95
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ $labels.service }}"
              description: "p95 latency is above 2 seconds."
          - alert: SchoolServiceHighErrorRate
            expr: sum(rate(http_request_duration_seconds_count{status_code=~"5.."}[5m])) by (service) / sum(rate(http_request_duration_seconds_count[5m])) by (service) > 0.01
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High error rate on {{ $labels.service }}"
              description: "5xx error rate is above 1%."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: school-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: school-platform
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: school-platform
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: School Platform
        orgId: 1
        folder: SRE
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
  sre-school-platform-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Availability",
          "datasource": "Prometheus",
          "targets": [{"expr": "avg(up{job=~\"api-gateway|auth-service|user-service|school-service|academic-service|assignment-service|content-service|analytics-service|notification-service\"})", "legendFormat": "availability", "refId": "A"}],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Request Rate",
          "datasource": "Prometheus",
          "targets": [{"expr": "sum(rate(http_request_duration_seconds_count[1m])) by (service)", "legendFormat": "{{service}}", "refId": "A"}],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []}
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "p95 Latency",
          "datasource": "Prometheus",
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))", "legendFormat": "{{service}} p95", "refId": "A"}],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "5xx Error Rate",
          "datasource": "Prometheus",
          "targets": [{"expr": "sum(rate(http_request_duration_seconds_count{status_code=~\"5..\"}[5m])) by (service) / sum(rate(http_request_duration_seconds_count[5m])) by (service)", "legendFormat": "{{service}}", "refId": "A"}],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []}
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["sre", "school-platform"],
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "title": "SRE School Platform Dashboard",
      "uid": "sre-school-platform",
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: school-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: school-secrets
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: school-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-provisioning
            items:
              - key: datasources.yml
                path: datasources.yml
        - name: grafana-dashboard-providers
          configMap:
            name: grafana-provisioning
            items:
              - key: dashboards.yml
                path: dashboards.yml
        - name: grafana-dashboards
          configMap:
            name: grafana-provisioning
            items:
              - key: sre-school-platform-dashboard.json
                path: sre-school-platform-dashboard.json
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: school-platform
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
